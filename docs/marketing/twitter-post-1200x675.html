<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 675px; font-family: 'IBM Plex Sans Arabic', sans-serif; background: #0F2747; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  .bg { position: absolute; inset: 0; background: linear-gradient(160deg, #0F2747 0%, #162d4a 50%, #1a3a5c 100%); }
  .glow { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,39,0.1) 0%, transparent 70%); }
  .content { position: relative; z-index: 10; text-align: center; padding: 60px; }
  .icon { font-size: 56px; margin-bottom: 32px; }
  h1 { font-size: 56px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 20px; }
  .gold { color: #C9A227; }
  p { font-size: 24px; color: rgba(255,255,255,0.5); margin-bottom: 40px; }
  .tags { display: flex; gap: 16px; justify-content: center; }
  .tag { background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.25); border-radius: 100px; padding: 10px 24px; color: #C9A227; font-size: 16px; font-weight: 500; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="icon">🏠</div>
    <h1>منصة عقارية <span class="gold">احترافية</span><br>لأصحاب الوكالات</h1>
    <p>7 أيام تجربة مجانية — بدون بطاقة ائتمان</p>
    <div class="tags">
      <div class="tag">#عقارات</div>
      <div class="tag">#جزائر</div>
      <div class="tag">#وكلاء_عقارات</div>
      <div class="tag">#تسويق_رقمي</div>
    </div>
  </div>
</body>
</html>
