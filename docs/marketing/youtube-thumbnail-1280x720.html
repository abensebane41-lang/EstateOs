<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; font-family: 'IBM Plex Sans Arabic', sans-serif; background: #0F2747; overflow: hidden; position: relative; display: flex; align-items: center; }
  .bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0F2747 0%, #1a3a5c 100%); }
  .stripe { position: absolute; right: 0; top: 0; width: 45%; height: 100%; background: #C9A227; clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%); }
  .content { position: relative; z-index: 10; display: flex; align-items: center; width: 100%; padding: 0 80px; }
  .left { flex: 1; }
  h1 { font-size: 64px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 20px; }
  .gold { color: #C9A227; }
  p { font-size: 24px; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 32px; }
  .duration { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 16px; color: rgba(255,255,255,0.7); font-size: 16px; }
  .right { width: 300px; display: flex; align-items: center; justify-content: center; }
  .play { width: 100px; height: 100px; background: #C9A227; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(201,162,39,0.4); }
  .play-triangle { width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-right: 32px solid #0F2747; margin-right: -4px; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="stripe"></div>
  <div class="content">
    <div class="left">
      <h1>كيف تنشئ<br>موقعك العقاري<br><span class="gold">احترافياً</span></h1>
      <p>7 أيام تجربة مجانية — في 5 دقائق فقط</p>
      <div class="duration">▶ فيديو تعليمي</div>
    </div>
    <div class="right">
      <div class="play"><div class="play-triangle"></div></div>
    </div>
  </div>
</body>
</html>
