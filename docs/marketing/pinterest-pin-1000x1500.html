<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1000px; height: 1500px; font-family: 'IBM Plex Sans Arabic', sans-serif; background: #0F2747; overflow: hidden; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .bg { position: absolute; inset: 0; background: linear-gradient(180deg, #0F2747 0%, #162d4a 50%, #0F2747 100%); }
  .glow1 { position: absolute; top: 10%; left: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,39,0.12) 0%, transparent 70%); }
  .glow2 { position: absolute; bottom: 10%; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,39,0.08) 0%, transparent 70%); }
  .content { position: relative; z-index: 10; text-align: center; padding: 80px; max-width: 800px; }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(201,162,39,0.15); border: 1px solid rgba(201,162,39,0.3); border-radius: 100px; padding: 12px 28px; margin-bottom: 60px; color: #C9A227; font-size: 20px; font-weight: 500; }
  .dot { width: 8px; height: 8px; background: #C9A227; border-radius: 50%; }
  h1 { font-size: 72px; font-weight: 800; color: #fff; line-height: 1.3; margin-bottom: 32px; }
  .gold { color: #C9A227; }
  p { font-size: 30px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 60px; }
  .features { display: flex; flex-direction: column; gap: 20px; margin-bottom: 60px; }
  .feat { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 18px 24px; }
  .feat-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.25); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .feat-text { font-size: 22px; color: rgba(255,255,255,0.8); font-weight: 500; }
  .cta { display: inline-flex; align-items: center; gap: 12px; background: #C9A227; color: #0F2747; font-size: 28px; font-weight: 700; padding: 24px 56px; border-radius: 16px; }
  .footer { position: absolute; bottom: 60px; color: rgba(255,255,255,0.3); font-size: 16px; direction: ltr; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="badge"><div class="dot"></div>7 أيام تجربة مجانية</div>
    <h1>موقعك العقاري<br><span class="gold">الاحترافي</span><br>في دقائق</h1>
    <p>أنشئ موقعك واعرض عقاراتك<br>على الإنترنت بسهولة</p>
    <div class="features">
      <div class="feat"><div class="feat-icon">🏠</div><div class="feat-text">موقع احترافي</div></div>
      <div class="feat"><div class="feat-icon">📊</div><div class="feat-text">لوحة تحكم متكاملة</div></div>
      <div class="feat"><div class="feat-icon">📱</div><div class="feat-text">متوافق مع جميع الأجهزة</div></div>
      <div class="feat"><div class="feat-icon">🌍</div><div class="feat-text">دعم العربية والفرنسية</div></div>
    </div>
    <div class="cta">ابدأ تجربتك المجانية ←</div>
  </div>
  <div class="footer">estate-os-beryl.vercel.app</div>
</body>
</html>
