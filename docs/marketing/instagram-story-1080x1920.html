<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; font-family: 'IBM Plex Sans Arabic', sans-serif; background: #0F2747; overflow: hidden; position: relative; }
  .bg-pattern { position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(201,162,39,0.15) 0%, transparent 60%), radial-gradient(circle at 20% 80%, rgba(201,162,39,0.08) 0%, transparent 50%); }
  .grid-lines { position: absolute; inset: 0; opacity: 0.03; background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 60px 60px; }
  .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px; text-align: center; }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(201,162,39,0.15); border: 1px solid rgba(201,162,39,0.3); border-radius: 100px; padding: 14px 32px; margin-bottom: 64px; color: #C9A227; font-size: 24px; font-weight: 500; }
  .badge-dot { width: 8px; height: 8px; background: #C9A227; border-radius: 50%; }
  .headline { font-size: 80px; font-weight: 700; color: #FFFFFF; line-height: 1.3; margin-bottom: 32px; }
  .headline .gold { color: #C9A227; }
  .subline { font-size: 36px; font-weight: 300; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 80px; max-width: 700px; }
  .features { display: flex; flex-direction: column; gap: 24px; margin-bottom: 80px; width: 100%; max-width: 600px; }
  .feature { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px 28px; }
  .feature-icon { width: 56px; height: 56px; border-radius: 14px; background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.25); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .feature-text { font-size: 24px; color: rgba(255,255,255,0.8); font-weight: 500; }
  .cta { display: inline-flex; align-items: center; gap: 16px; background: #C9A227; color: #0F2747; font-size: 32px; font-weight: 700; padding: 28px 64px; border-radius: 18px; }
  .swipe-up { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .swipe-arrow { font-size: 24px; }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      7 أيام تجربة مجانية
    </div>
    <h1 class="headline">
      وكالتك العقارية<br>
      <span class="gold">على الإنترنت</span><br>
      في 5 دقائق
    </h1>
    <p class="subline">
      اعرض عقاراتك على موقع احترافي<br>
      واجذب عملاء جدد كل يوم
    </p>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🏠</div>
        <div class="feature-text">موقع احترافي</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">لوحة تحكم احترافية</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div class="feature-text">متوافق مع جميع الأجهزة</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🌍</div>
        <div class="feature-text">دعم اللغة العربية والفرنسية</div>
      </div>
    </div>
    <div class="cta">ابدأ تجربتك المجانية ←</div>
  </div>
  <div class="swipe-up">
    <span class="swipe-arrow">↑</span>
    اسحب للأعلى
  </div>
</body>
</html>
