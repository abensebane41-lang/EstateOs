<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 820px; height: 312px; font-family: 'IBM Plex Sans Arabic', sans-serif; background: #0F2747; overflow: hidden; position: relative; display: flex; align-items: center; }
  .bg-gradient { position: absolute; inset: 0; background: linear-gradient(135deg, #0F2747 0%, #1a3a5c 50%, #0F2747 100%); }
  .gold-accent { position: absolute; top: -100px; left: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,39,0.12) 0%, transparent 70%); }
  .content { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 60px; }
  .right { flex: 1; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,162,39,0.15); border: 1px solid rgba(201,162,39,0.3); border-radius: 100px; padding: 6px 16px; margin-bottom: 16px; color: #C9A227; font-size: 13px; font-weight: 500; }
  .headline { font-size: 36px; font-weight: 700; color: #FFFFFF; line-height: 1.3; margin-bottom: 12px; }
  .headline .gold { color: #C9A227; }
  .subline { font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .left { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cta { display: inline-flex; align-items: center; gap: 8px; background: #C9A227; color: #0F2747; font-size: 16px; font-weight: 700; padding: 14px 32px; border-radius: 12px; white-space: nowrap; }
  .url { font-size: 13px; color: rgba(255,255,255,0.4); direction: ltr; }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="gold-accent"></div>
  <div class="content">
    <div class="right">
      <div class="badge">7 أيام تجربة مجانية</div>
      <h1 class="headline">وكالتك العقارية<br><span class="gold">على الإنترنت</span></h1>
      <p class="subline">اعرض عقاراتك واجذب عملاء جدد</p>
    </div>
    <div class="left">
      <div class="cta">ابدأ تجربتك المجانية ←</div>
      <div class="url">estate-os-beryl.vercel.app</div>
    </div>
  </div>
</body>
</html>
