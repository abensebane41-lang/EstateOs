<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: #0F2747;
    overflow: hidden;
    position: relative;
  }

  .bg-pattern {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 80%, rgba(201,162,39,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(201,162,39,0.1) 0%, transparent 50%);
  }

  .grid-lines {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(255,255,255,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,162,39,0.15);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 100px;
    padding: 12px 28px;
    margin-bottom: 48px;
    color: #C9A227;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    background: #C9A227;
    border-radius: 50%;
  }

  .headline {
    font-size: 72px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 24px;
  }

  .headline .gold {
    color: #C9A227;
  }

  .subline {
    font-size: 32px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    margin-bottom: 64px;
    max-width: 700px;
  }

  .features {
    display: flex;
    gap: 48px;
    margin-bottom: 64px;
  }

  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .feature-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: rgba(201,162,39,0.12);
    border: 1px solid rgba(201,162,39,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .feature-text {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: #C9A227;
    color: #0F2747;
    font-size: 28px;
    font-weight: 700;
    padding: 24px 56px;
    border-radius: 16px;
    text-decoration: none;
    transition: all 0.3s;
  }

  .cta-arrow {
    font-size: 24px;
  }

  .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  .footer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.5);
    font-size: 18px;
  }

  .footer-dot {
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      منصة مجانية لأصحاب الوكالات
    </div>

    <h1 class="headline">
      وكالتك العقارية<br>
      <span class="gold">على الإنترنت</span><br>
      في 5 دقائق
    </h1>

    <p class="subline">
      اعرض عقاراتك على موقع احترافي<br>
      واجذب عملاء جدد كل يوم
    </p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🏠</div>
        <div class="feature-text">موقع مجاني</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">لوحة تحكم</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div class="feature-text">متوافق مع الجوال</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🌍</div>
        <div class="feature-text">عربي + فرنسي</div>
      </div>
    </div>

    <div class="cta">
      ابدأ مجاناً الآن
      <span class="cta-arrow">←</span>
    </div>
  </div>

  <div class="footer-bar">
    <div class="footer-item">🌐 estate-os-beryl.vercel.app</div>
    <div class="footer-dot"></div>
    <div class="footer-item">📱 تجربة مجانية 7 أيام</div>
  </div>
</body>
</html>
